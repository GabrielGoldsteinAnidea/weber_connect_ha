name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"
          # `brands` is ignored until this integration is added to the
          # home-assistant/brands repo (HA/HACS fetch icons only from that CDN;
          # the brands/ folder here just holds the prepared assets). Remove this
          # once the brands PR is merged so the check runs.
          ignore: "brands"
